name: Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/vctrin/parceiros-indicacao
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.image-meta.outputs.image-ref }}
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: image-tag
        run: echo "tag=$(node scripts/docker-image-tag.mjs)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Export image metadata
        id: image-meta
        run: echo "image-ref=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_USER: ${{ secrets.SERVER_USER || 'admin' }}
      SERVICE_NAME: ${{ secrets.SERVER_SERVICE_NAME || 'parceiros-indicacao_parceiros-indicacao' }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || 'vctrin' }}
      IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}

    steps:
      - name: Validate deployment secrets
        run: |
          missing=0

          if [ -z "$SERVER_HOST" ]; then
            echo "::error::Missing required secret SERVER_HOST"
            missing=1
          fi

          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::error::Missing required secret SERVER_SSH_KEY"
            missing=1
          fi

          if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "::error::Missing required secret GHCR_TOKEN"
            missing=1
          fi

          exit "$missing"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Update Swarm service
        run: |
          printf '%s\n' "${{ secrets.GHCR_TOKEN }}" | ssh \
            -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin >/dev/null && docker service update --with-registry-auth --image '$IMAGE_REF' --detach=false '$SERVICE_NAME'"

      - name: Show service status
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "docker service ps '$SERVICE_NAME' --no-trunc"
